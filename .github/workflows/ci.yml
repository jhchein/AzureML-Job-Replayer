name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly vulnerability scan (Monday 08:00 UTC)
    - cron: "0 8 * * 1"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest tests/ --tb=short -q

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Export requirements
        run: uv export --format requirements-txt --no-hashes > /tmp/reqs.txt

      - name: Run vulnerability audit
        run: |
          IGNORE_FLAGS=$(grep -v '^\s*#' .pip-audit-known-vulns.txt | grep -v '^\s*$' | sed 's/^/--ignore-vuln /' | tr '\n' ' ')
          uv run pip-audit -r /tmp/reqs.txt $IGNORE_FLAGS
